<!DOCTYPE html>
<html>
<head>
  <title>Live Voting Site</title>
</head>
<body style="text-align:center;font-family:Arial">

<h1>🗳️ Live Voting</h1>

<h2>ஆதரவு: <span id="yes">0</span></h2>
<h2>எதிர்ப்பு: <span id="no">0</span></h2>

<button onclick="voteYes()">👍 ஆதரவு</button>
<button onclick="voteNo()">👎 எதிர்ப்பு</button>

<script>
let yes = 0;
let no = 0;

function voteYes(){
  yes++;
  document.getElementById("yes").innerText = yes;
}

function voteNo(){
  no++;
  document.getElementById("no").innerText = no;
}
</script>

</body>
</html>
